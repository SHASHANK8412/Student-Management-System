services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: student_fees
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_fees"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: Student Fee Management System
      ENVIRONMENT: production
      DEBUG: "false"
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/student_fees
      CORS_ORIGINS: http://localhost:8080,http://localhost
      FRONTEND_URL: http://localhost:8080
      BACKEND_URL: http://localhost:8000
      UPLOAD_DIR: /app/uploads
      RATE_LIMIT_PER_MINUTE: 120
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  backend_uploads:

name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: student_fees
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/student_fees
      SECRET_KEY: ci-secret-key
      APP_NAME: Student Fee Management System
      ENVIRONMENT: ci
      DEBUG: "false"
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:8000
      UPLOAD_DIR: uploads
      RATE_LIMIT_PER_MINUTE: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: python -m compileall app tests
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: npm install
      - run: npm run build
      - name: Deploy frontend to Vercel
        if: github.ref == 'refs/heads/main'
        run: echo "Use Vercel Git integration or the Vercel CLI with secrets in production."

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend to Render
        run: echo "Trigger your Render deploy hook from GitHub Secrets after successful CI."
